<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India Telemetry Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <!-- Leaflet CSS -->
    <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <!-- Socket.IO -->
    <script src="/socket.io/socket.io.js"></script>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>

<h1>🇮🇳 India Telemetry Dashboard</h1>

<div id="map"></div>

<table>
    <thead>
        <tr>
            <th>Node</th>
            <th>City</th>
            <th>Temperature (°C)</th>
            <th>Humidity (%)</th>
            <th>Networks Found</th>
            <th>Avg RSSI</th>
        </tr>
    </thead>

    <tbody id="tableBody">
    </tbody>
</table>

<script src="script.js"></script>

</body>
</html>
